<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breaking the Ceiling — Gender Equity in Tech</title>
  <style>
    :root {
      --neon-pink: #ff69b4;
      --neon-cyan: #00ffff;
      --gold: #ffd700;
    }

    body {
      margin: 0;
      height: 100vh;
      background: linear-gradient(135deg, #1a0033, #330066, #660033);
      overflow: hidden;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .scene {
      position: relative;
      width: 920px;
      height: 620px;
      perspective: 1400px;
    }

    .title {
      position: absolute;
      top: 30px;
      width: 100%;
      text-align: center;
      font-size: 46px;
      font-weight: 900;
      letter-spacing: 4px;
      text-shadow: 0 0 30px var(--neon-pink), 0 0 60px var(--neon-cyan);
      z-index: 20;
    }

    .subtitle {
      font-size: 22px;
      color: var(--neon-pink);
      margin-top: 8px;
    }

    .quote {
      position: absolute;
      top: 120px;
      width: 100%;
      text-align: center;
      font-size: 19px;
      opacity: 0.9;
      text-shadow: 0 0 15px var(--neon-pink);
      z-index: 15;
    }

    /* Glass Ceiling */
    .ceiling {
      position: absolute;
      top: 170px;
      left: 50%;
      transform: translateX(-50%);
      width: 720px;
      height: 190px;
      background: linear-gradient(to bottom, rgba(255,255,255,0.18), rgba(255,255,255,0.06));
      border: 10px solid rgba(255,255,255,0.35);
      border-radius: 25px;
      box-shadow: 0 0 70px rgba(255, 215, 0, 0.7);
      cursor: pointer;
      transition: all 0.4s ease;
      overflow: hidden;
    }

    .ceiling::after {
      content: "Click to break";
      position: absolute;
      bottom: -28px;
      width: 100%;
      text-align: center;
      font-size: 14px;
      opacity: 0.7;
    }

    .crack {
      position: absolute;
      background: rgba(255,255,255,0.95);
      box-shadow: 0 0 25px var(--gold);
      transition: all 0.6s ease;
    }

    /* Shards */
    .shard {
      position: absolute;
      width: 35px;
      height: 35px;
      background: linear-gradient(45deg, var(--gold), var(--neon-pink));
      clip-path: polygon(50% 0%, 100% 40%, 70% 100%, 20% 80%);
      animation: fall linear forwards;
      box-shadow: 0 0 15px var(--gold);
    }

    @keyframes fall {
      to {
        transform: translateY(900px) rotate(720deg);
        opacity: 0;
      }
    }

    /* Team */
    .team {
      position: absolute;
      bottom: 90px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 55px;
      z-index: 10;
    }

    .person {
      text-align: center;
      animation: float 3.2s infinite ease-in-out;
    }

    .avatar {
      font-size: 68px;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 18px var(--neon-cyan));
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-22px); }
    }

    /* Holo Screen */
    .holo-screen {
      position: absolute;
      top: 380px;
      left: 50%;
      transform: translateX(-50%);
      width: 440px;
      height: 170px;
      background: rgba(0, 255, 255, 0.12);
      border: 4px solid var(--neon-cyan);
      border-radius: 18px;
      box-shadow: 0 0 90px var(--neon-cyan);
      padding: 18px;
      font-family: monospace;
      font-size: 14.5px;
      color: #00ffcc;
      overflow: hidden;
      z-index: 12;
    }

    .after-shatter {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 28px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 40px var(--neon-pink);
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s;
      text-align: center;
      line-height: 1.3;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .scene { transform: scale(0.78); }
      .title { font-size: 32px; }
      .subtitle { font-size: 18px; }
    }
  </style>
</head>
<body>

<div class="scene">
  <div class="title">
    BREAKING THE CEILING
    <div class="subtitle">Gender Equity in Tech</div>
  </div>

  <div class="quote">"Equal code. Equal opportunity. Built together."</div>

  <!-- Glass Ceiling -->
  <div class="ceiling" id="ceiling">
    <div class="crack" id="crack1" style="width:240px;height:5px;top:55px;left:90px;transform:rotate(-28deg);"></div>
    <div class="crack" id="crack2" style="width:210px;height:4px;top:95px;left:380px;transform:rotate(32deg);"></div>
  </div>

  <!-- Team -->
  <div class="team">
    <div class="person" style="animation-delay: 0s;">
      <div class="avatar">👩‍💻</div>
      <div style="color:var(--neon-pink);font-weight:600;">Priya</div>
      <div style="color:#ccc;font-size:13px;">AI Engineer</div>
    </div>
    <div class="person" style="animation-delay: 0.4s;">
      <div class="avatar">👩🏾‍💻</div>
      <div style="color:var(--neon-pink);font-weight:600;">Aisha</div>
      <div style="color:#ccc;font-size:13px;">Full Stack Dev</div>
    </div>
    <div class="person" style="animation-delay: 0.8s;">
      <div class="avatar">🧑‍💻</div>
      <div style="color:var(--neon-pink);font-weight:600;">Sam</div>
      <div style="color:#ccc;font-size:13px;">Data Scientist</div>
    </div>
  </div>

  <!-- Holo Screen -->
  <div class="holo-screen" id="screen">
    <div id="code"></div>
  </div>

  <div class="after-shatter" id="message">
    The ceiling is gone.<br>
    <span style="font-size:24px;color:var(--neon-cyan);">Now we build the future — together.</span>
  </div>
</div>

<script>
const codeText = `const equity = {\n  access: true,\n  diversity: "strength",\n  inclusion: "non-negotiable"\n};\n\nbuildFuture(equity);`;

let i = 0;
const codeEl = document.getElementById("code");

function typeWriter() {
  if (i < codeText.length) {
    codeEl.innerHTML += codeText.charAt(i) === '\n' ? '<br>' : codeText.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}
typeWriter();

const ceiling = document.getElementById("ceiling");
const crack1 = document.getElementById("crack1");
const crack2 = document.getElementById("crack2");
const message = document.getElementById("message");
let shatterCount = 0;

ceiling.addEventListener("click", () => {
  shatterCount++;

  // Screen shake
  document.querySelector('.scene').style.transition = 'transform 80ms';
  document.querySelector('.scene').style.transform = 'translateX(4px)';
  setTimeout(() => document.querySelector('.scene').style.transform = 'translateX(-4px)', 80);

  // More cracks on repeated clicks
  if (shatterCount === 1) {
    crack1.style.width = '320px';
    crack2.style.height = '6px';
  } else if (shatterCount === 2) {
    crack1.style.transform = 'rotate(-45deg)';
    crack2.style.transform = 'rotate(48deg)';
  }

  // Create shards
  for (let k = 0; k < 28; k++) {
    const shard = document.createElement('div');
    shard.className = 'shard';
    shard.style.left = (Math.random() * 720 + 100) + 'px';
    shard.style.top = (170 + Math.random() * 80) + 'px';
    shard.style.width = (25 + Math.random() * 35) + 'px';
    shard.style.height = shard.style.width;
    shard.style.animationDuration = (2.8 + Math.random() * 3.5) + 's';
    shard.style.opacity = 0.7 + Math.random() * 0.3;
    shard.style.background = `linear-gradient(45deg, #ffd700, ${Math.random() > 0.5 ? '#ff69b4' : '#00ffff'})`;
    document.querySelector('.scene').appendChild(shard);

    setTimeout(() => shard.remove(), 7000);
  }

  // After 3 clicks → full shatter
  if (shatterCount >= 3) {
    ceiling.style.opacity = '0.15';
    ceiling.style.pointerEvents = 'none';

    setTimeout(() => {
      message.style.opacity = '1';
      
      // Extra floating symbols
      for (let j = 0; j < 12; j++) {
        const sym = document.createElement('div');
        sym.textContent = ['♀️', '⚧️', '💻', '🚀', '🔗'][Math.floor(Math.random()*5)];
        sym.style.position = 'absolute';
        sym.style.left = Math.random() * 100 + '%';
        sym.style.top = '-50px';
        sym.style.fontSize = '28px';
        sym.style.opacity = '0.8';
        sym.style.animation = `floatUp ${4 + Math.random()*3}s linear forwards`;
        document.querySelector('.scene').appendChild(sym);
        setTimeout(() => sym.remove(), 8000);
      }
    }, 1200);
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" || e.key === " ") {
    ceiling.click();
  }
});

// Add floating up animation
const style = document.createElement('style');
style.innerHTML = `
@keyframes floatUp {
  to { transform: translateY(-800px); opacity: 0; }
}`;
document.head.appendChild(style);
</script>

</body>
</html>
